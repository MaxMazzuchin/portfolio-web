    <!-- Full-screen lightbox: backdrop close, on-screen arrows, image click = zoom cycle, Esc / ← / → -->

        <button type="button" id="close-btn" class="lightbox-close" aria-label="Close">×</button>
        <button type="button" id="prev-btn" class="lightbox-nav lightbox-prev" aria-label="Previous image">←</button>
        <button type="button" id="next-btn" class="lightbox-nav lightbox-next" aria-label="Next image">→</button>
        <div id="lightbox-stage" class="lightbox-stage">
            <img id="lightbox-img" class="lightbox-asset" src="" alt="">
            <video id="lightbox-video" class="lightbox-asset lightbox-asset--hidden" muted loop playsinline disablePictureInPicture preload="metadata"></video>
